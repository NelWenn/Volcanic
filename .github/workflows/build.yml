# Build every change made to the Minecraft 1.21.1 branch.

name: build

on:
  push:
    branches:
      - 1.21.1
  pull_request:
    branches:
      - 1.21.1

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: verify minecraft version
        run: grep -qx 'minecraft_version=1.21.1' gradle.properties
      - name: setup jdk 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: microsoft
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VulkanMod-1.21.1
          path: build/libs/
          if-no-files-found: error
